// PERSISTENCE — Auto-save to localStorage + manual Export/Import
// ══════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = "busybee_data_v1";

function getAppState(){
  return {projects,activeProj,activeView,globalSubs,savedAt:new Date().toISOString(),version:1};
}


function loadFromStorage(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const state = JSON.parse(raw);
    if(!state.projects || !state.projects.length) return false;
    projects   = state.projects;
    activeProj = state.activeProj || projects[0]?.id || null;
    activeView = state.activeView || "dash";
    // Load globalSubs if saved
    if(state.globalSubs&&Array.isArray(state.globalSubs)){
      globalSubs=state.globalSubs;
    }
    // ── Always migrate any per-project subs → globalSubs ─────────────────
    var migrated=false;
    projects.forEach(function(p){
      if(p.subs&&Array.isArray(p.subs)&&p.subs.length){
        p.subs.forEach(function(s){
          if(!s.name)return;
          var exists=globalSubs.find(function(g){
            return g.name.trim().toLowerCase()===s.name.trim().toLowerCase();
          });
          if(!exists){
            globalSubs.push({id:subIdCounter++,
              name:s.name||"",company:s.company||"",
              trade:s.trade||"General",phone:s.phone||"",
              email:s.email||"",notes:s.notes||""});
            migrated=true;
          }
        });
        delete p.subs;
      }
    });
    if(migrated)autoSave(); // persist the migrated subs immediately
    return true;
  } catch(e){ console.warn("Load failed:", e); return false; }
}

function exportData(){
  const json = JSON.stringify(getAppState(), null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = "BusyBee_Backup_" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("✓ Backup downloaded to your Downloads folder");
}

function importData(){
  const inp   = document.createElement("input");
  inp.type    = "file";
  inp.accept  = ".json,application/json";
  inp.onchange = function(){
    const file = inp.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const state = JSON.parse(e.target.result);
        if(!state.projects || !Array.isArray(state.projects)){ alert("Invalid backup file."); return; }
        projects   = state.projects;
        activeProj = state.activeProj || projects[0]?.id || null;
        activeView = state.activeView || "dash";
        autoSave();
        renderProjBar(); updateProjHero(); renderCurrentView();
        showToast("✓ Loaded " + projects.length + " project(s) from backup");
      } catch(err){ alert("Could not read file: " + err.message); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function resetAllData(){
  if(!confirm("⚠️ This will delete ALL projects and reset to defaults.\n\nAre you sure?")) return;
  localStorage.removeItem(STORAGE_KEY);
  projects   = [{id:"p1", name:"211 Nata Gut Renovation", tasks:defaultTasks()}];
  activeProj = "p1"; activeView = "dash";
  renderProjBar(); updateProjHero(); renderCurrentView();
  showToast("App reset to defaults");
}

function showToast(msg, duration){
  duration = duration || 2800;
  let t = document.getElementById("bb-toast");
  if(!t){
    t = document.createElement("div"); t.id = "bb-toast";
    t.style.cssText = "position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a202c;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;padding:10px 20px;border-radius:10px;z-index:9999;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.25)";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = "1"; t.style.transform = "translateX(-50%) translateY(0)";
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.style.opacity="0"; t.style.transform="translateX(-50%) translateY(20px)"; }, duration);
}

// Hook auto-save into all state-mutating functions
(function hookAutoSave(){
  var fns = ["addTask","deleteTask","updateTask","moveTask","moveGanttRow",
    "addProject","removeProj","createFromTemplate","saveProjectName",
    "saveMaterial","updateMat","deleteMat","saveSub","updateSub","deleteSub",
    "applyStartDate","clearStartDate","switchProj","switchView"];
  fns.forEach(function(fnName){
    if(typeof window[fnName] !== "function") return;
    var orig = window[fnName];
    window[fnName] = function(){
      var result = orig.apply(this, arguments);
      autoSave();
      return result;
    };
  });
})();

// ── Overview ─────────────────────────────────────────────────────────────
function renderOverview(){
  var el=document.getElementById("ov-content");
  if(!el)return;
  if(!projects||!projects.length){
    el.innerHTML='<div class="ov-wrap"><div class="ov-empty"><div class="big">🏗</div><p>No projects yet.<br>Click <strong>+</strong> to create your first project.</p></div></div>';
    return;
  }
  var totalTasks=0,totalDone=0,totalInProg=0,totalDelayed=0;
  projects.forEach(function(p){
    var t=p.tasks||[];totalTasks+=t.length;
    t.forEach(function(tk){
      if(tk.status==="Complete")totalDone++;
      else if(tk.status==="In Progress")totalInProg++;
      else if(tk.status==="Delayed")totalDelayed++;
    });
  });
  var gPct=totalTasks?Math.round(totalDone/totalTasks*100):0;
  var statsHtml='<div class="ov-stats-row">'
    +'<div class="ov-stat-card"><div class="ov-stat-val">'+projects.length+'</div><div class="ov-stat-lbl">Projects</div></div>'
    +'<div class="ov-stat-card"><div class="ov-stat-val">'+gPct+'%</div><div class="ov-stat-lbl">Overall Progress</div><div class="ov-stat-sub">'+totalDone+' / '+totalTasks+' tasks</div></div>'
    +'<div class="ov-stat-card"><div class="ov-stat-val" style="color:#4299e1">'+totalInProg+'</div><div class="ov-stat-lbl">In Progress</div></div>'
    +'<div class="ov-stat-card"><div class="ov-stat-val" style="color:'+(totalDelayed?'#e53e3e':'#48bb78')+'">'+totalDelayed+'</div><div class="ov-stat-lbl">Delayed</div></div>'
    +'</div>';
  var cardsHtml='<div class="ov-grid">';
  projects.forEach(function(p){
    var tasks=p.tasks||[];
    var tot=tasks.length,done=0,inprog=0,pend=0,hold=0,delay=0;
    tasks.forEach(function(t){
      if(t.status==="Complete")done++;
      else if(t.status==="In Progress")inprog++;
      else if(t.status==="Pending")pend++;
      else if(t.status==="On Hold")hold++;
      else if(t.status==="Delayed")delay++;
    });
    var pct=tot?Math.round(done/tot*100):0;
    var barColor=pct>=75?"linear-gradient(90deg,#48bb78,#38a169)":pct>=40?"linear-gradient(90deg,#f6ad55,#ed8936)":"linear-gradient(90deg,#fc8181,#e53e3e)";
    if(!tot)barColor="linear-gradient(90deg,#cbd5e0,#a0aec0)";
    var phMap={};
    tasks.forEach(function(t){
      if(!phMap[t.phase])phMap[t.phase]={tot:0,done:0,color:(PHASES[t.phase]||{bd:"#ccc"}).bd};
      phMap[t.phase].tot++;if(t.status==="Complete")phMap[t.phase].done++;
    });
    var phKeys=Object.keys(phMap).slice(0,5);
    var phHtml='<div class="ov-phases">';
    phKeys.forEach(function(ph){
      var pm=phMap[ph];var pp=pm.tot?Math.round(pm.done/pm.tot*100):0;
      phHtml+='<div class="ov-ph-row"><span class="ov-ph-name">'+ph+'</span>'
        +'<div class="ov-ph-track"><div class="ov-ph-fill" style="width:'+pp+'%;background:'+pm.color+'"></div></div>'
        +'<span class="ov-ph-pct">'+pp+'%</span></div>';
    });
    phHtml+='</div>';
    var pillsHtml='<div class="ov-pills">';
    if(done)pillsHtml+='<span class="ov-pill" style="background:#c6f6d5;color:#1c4532">'+done+' Done</span>';
    if(inprog)pillsHtml+='<span class="ov-pill" style="background:#bee3f8;color:#1a365d">'+inprog+' Active</span>';
    if(pend)pillsHtml+='<span class="ov-pill" style="background:#fefcbf;color:#744210">'+pend+' Pending</span>';
    if(delay)pillsHtml+='<span class="ov-pill" style="background:#fed7d7;color:#742a2a">'+delay+' Delayed</span>';
    if(hold)pillsHtml+='<span class="ov-pill" style="background:#fed7c3;color:#7b341e">'+hold+' On Hold</span>';
    if(!tot)pillsHtml+='<span class="ov-pill" style="background:#e2e8f0;color:#718096">No tasks</span>';
    pillsHtml+='</div>';
    var nextTask=null;
    for(var i=0;i<tasks.length;i++){if(tasks[i].status==="In Progress"||tasks[i].status==="Pending"){nextTask=tasks[i];break;}}
    var nextHtml=nextTask?'<div class="ov-next">Next: <strong>'+nextTask.name+'</strong></div>':"";
    cardsHtml+='<div class="ov-card" onclick="ovOpenProject(\''+p.id+'\')"><div class="ov-card-head">'
      +'<div class="ov-card-name">'+p.name+'</div>'
      +'<div class="ov-card-meta"><span>'+tot+' tasks</span></div>'
      +'</div>'
      +'<div class="ov-prog-wrap"><div class="ov-prog-top"><span class="ov-prog-pct">'+pct+'%</span><span class="ov-prog-count">'+done+' / '+tot+' complete</span></div>'
      +'<div class="ov-bar-track"><div class="ov-bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div></div>'
      +phHtml+pillsHtml+nextHtml
      +'<div class="ov-foot"><button class="ov-open-btn" onclick="event.stopPropagation();ovOpenProject(\''+p.id+'\')">Open Project →</button></div>'
      +'</div>';
  });
  cardsHtml+='</div>';
  el.innerHTML='<div class="ov-wrap">'+statsHtml+cardsHtml+'</div>';
}

function addDep(fromIdx,toIdx){

function wouldCycle(fromIdx,toIdx){
  var deps=getDeps();var visited={};var queue=[toIdx];
  while(queue.length){var cur=queue.shift();if(cur===fromIdx)return true;if(visited[cur])continue;visited[cur]=true;deps.forEach(function(d){if(d.from===cur)queue.push(d.to);});}
  return false;
}
function removeDep(fromIdx,toIdx){

function cascadeTask(toIdx,deps,tasks){
  var predecessors=deps.filter(function(d){return d.to===toIdx;});if(!predecessors.length)return;
  var maxEnd=0;predecessors.forEach(function(d){var pred=tasks[d.from];if(pred&&pred.eo!=null)maxEnd=Math.max(maxEnd,pred.eo);});
  if(maxEnd===0)return;
  var t=tasks[toIdx];if(!t)return;
  var dur=(t.so!=null&&t.eo!=null)?(t.eo-t.so):(t.dur||5);
  if(t.so!==maxEnd){t.so=maxEnd;t.eo=maxEnd+dur;t.dur=dur;}
}
function cascadeSuccessors(movedIdx){
  var tasks=proj()?.tasks;if(!tasks)return;
  var deps=getDeps();if(!deps.length)return;
  var visited={};var queue=[movedIdx];
  while(queue.length){var cur=queue.shift();if(visited[cur])continue;visited[cur]=true;
    deps.filter(function(d){return d.from===cur;}).forEach(function(d){cascadeTask(d.to,deps,tasks);queue.push(d.to);});}

function getBarEndPos(idx){

function makePath(x1,y1,x2,y2){var mx=x1+(x2-x1)*0.5;return "M"+x1+","+y1+" C"+mx+","+y1+" "+mx+","+y2+" "+x2+","+y2;}

  var today=new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  var allP=[];
  projects.forEach(function(p){
    var tasks=p.tasks||[];var mats=p.materials||[];
    var done=tasks.filter(function(t){return t.status==="Complete";}).length;
    var inp=tasks.filter(function(t){return t.status==="In Progress";}).length;
    var delayed=tasks.filter(function(t){return t.status==="Delayed";}).length;
    var upcoming=tasks.filter(function(t){return t.so!=null&&t.so>=todayOff&&t.so<=todayOff+3&&t.status!=="Complete";});
    var overdue=tasks.filter(function(t){return t.eo!=null&&t.eo<todayOff&&t.status!=="Complete";});
    var toOrder=mats.filter(function(m){return m.status==="To Order";}).slice(0,10);
    allP.push({name:p.name,total:tasks.length,complete:done,inProgress:inp,delayed:delayed,
      upcoming:upcoming.map(function(t){return t.name+"("+t.phase+")";}),
      overdue:overdue.map(function(t){return t.name;}),
      toOrder:toOrder.map(function(m){return m.name;})});
  });
  var subs=globalSubs.map(function(s){return s.name+(s.trade?" ("+s.trade+")":"");});
  return "TODAY:"+today+"\nPROJECTS:"+JSON.stringify(allP,null,1)+"\nSUBS:"+subs.join(", ")+"\nACTIVE:"+(proj()?.name||"None");
}
var AI_PROMPTS={
  briefing:"Generate a professional daily project briefing. Include what's in progress, due today/this week, delays, materials to order, subs needed. Format ready to email.",
  subs:"List exactly which subs I need to schedule in the next 7 days, for which tasks, on what dates.",
  materials:"Create a prioritized ordering list of all materials marked To Order.",
  delayed:"Identify all delayed/overdue tasks with impact and action plan.",
  email:"Write a professional client update email for today.",
  focus:"What are my top 3-5 priorities today?"
};
function aiQuick(type){var p=AI_PROMPTS[type];if(!p)return;var inp=document.getElementById("ai-input");if(inp)inp.value=p;aiSend();}
function aiSend(){
  var input=document.getElementById("ai-input"),sendBtn=document.getElementById("ai-send-btn"),notesEl=document.getElementById("ai-notes-inp");
  var userMsg=(input?.value||"").trim(),notes=(notesEl?.value||"").trim();
  if(!userMsg)return;
  var GEMINI_KEY=window.BUSYBEE_GEMINI_KEY||"";
  if(!GEMINI_KEY){aiAddMessage("bot","⚠ No API key. Tap ⚙ to add your free Gemini key from aistudio.google.com");return;}
  var fullMsg=userMsg+(notes?"\n\nSite notes:\n"+notes:"");
  aiAddMessage("user",userMsg);if(input)input.value="";if(sendBtn)sendBtn.disabled=true;
  var typingId=aiShowTyping();
  aiConversation.push({role:"user",content:fullMsg});
  var MODEL=window.BUSYBEE_GEMINI_MODEL||"gemini-2.5-flash-preview-04-17";
  var sys="You are BusyBee AI, a construction project assistant. Be direct and practical.\nDATA:\n"+buildAIContext();
  var contents=aiConversation.map(function(m){return {role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]};});
  fetch("https://generativelanguage.googleapis.com/v1beta/models/"+MODEL+":generateContent?key="+GEMINI_KEY,
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:contents,generationConfig:{maxOutputTokens:1024,temperature:0.7}})})
  .then(function(r){return r.json();})
  .then(function(data){
    aiHideTyping(typingId);if(sendBtn)sendBtn.disabled=false;
    var reply="";
    if(data.candidates&&data.candidates[0]){reply=data.candidates[0].content.parts[0].text;}
    else if(data.error){reply="⚠ Gemini error: "+data.error.message;}
    else{reply="⚠ Unexpected response.";}
    aiConversation.push({role:"assistant",content:reply});aiAddMessage("bot",reply,true);
    if(notesEl)notesEl.value="";var na=document.getElementById("ai-notes-area");if(na)na.style.display="none";
  })
  .catch(function(err){aiHideTyping(typingId);if(sendBtn)sendBtn.disabled=false;aiAddMessage("bot","⚠ Error: "+err.message);});
}
function aiAddMessage(role,text,showCopy){
  var msgs=document.getElementById("ai-messages");if(!msgs)return;
  var div=document.createElement("div");div.className="ai-msg ai-msg-"+(role==="user"?"user":"bot");
  var avatar=document.createElement("div");avatar.className="ai-msg-avatar";avatar.textContent=role==="user"?"You":"🤖";
  var bubble=document.createElement("div");bubble.className="ai-msg-bubble";
  bubble.innerHTML=text.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
  if(showCopy&&role==="bot"){var cb=document.createElement("button");cb.className="ai-copy-btn";cb.textContent="📋 Copy";cb.onclick=function(){navigator.clipboard.writeText(text).then(function(){cb.textContent="✓ Copied!";setTimeout(function(){cb.textContent="📋 Copy";},2000);});};bubble.appendChild(document.createElement("br"));bubble.appendChild(cb);}
  div.appendChild(avatar);div.appendChild(bubble);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function aiShowTyping(){
  var msgs=document.getElementById("ai-messages");if(!msgs)return null;
  var id="t"+Date.now(),div=document.createElement("div");div.className="ai-msg ai-msg-bot";div.id=id;
  div.innerHTML='<div class="ai-msg-avatar">🤖</div><div class="ai-msg-bubble"><div class="ai-typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return id;
}
function aiHideTyping(id){if(!id)return;var el=document.getElementById(id);if(el)el.remove();}
var aiRecognition=null,aiListening=false;
function aiToggleMic(){if(aiListening){if(aiRecognition)aiRecognition.stop();aiListening=false;return;}aiStartListening();}
function aiStartListening(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){aiAddMessage("bot","⚠ Voice not supported. Try Chrome.");return;}
  aiRecognition=new SR();aiRecognition.continuous=false;aiRecognition.interimResults=true;aiRecognition.lang="en-US";
  var micBtn=document.getElementById("ai-mic-btn"),inputEl=document.getElementById("ai-input");
  aiRecognition.onstart=function(){aiListening=true;if(micBtn){micBtn.classList.add("listening");micBtn.textContent="🔴";}if(inputEl)inputEl.placeholder="🎤 Listening…";};
  aiRecognition.onresult=function(ev){var t="";for(var i=ev.resultIndex;i<ev.results.length;i++)t+=ev.results[i][0].transcript;if(inputEl){var ex=inputEl.dataset.savedText||"";inputEl.value=ex+(ex?" ":"")+t;}};
  aiRecognition.onend=function(){aiListening=false;if(micBtn){micBtn.classList.remove("listening");micBtn.textContent="🎤";}if(inputEl){inputEl.placeholder="Ask anything or tap 🎤 to speak…";inputEl.dataset.savedText=inputEl.value;}var text=inputEl?inputEl.value.trim():"";if(text)setTimeout(function(){if(inputEl&&inputEl.value.trim()){inputEl.dataset.savedText="";aiSend();}},800);};
  aiRecognition.onerror=function(ev){aiListening=false;if(micBtn){micBtn.classList.remove("listening");micBtn.textContent="🎤";}if(inputEl)inputEl.placeholder="Ask anything or tap 🎤 to speak…";var msg={"not-allowed":"⚠ Mic access denied.","no-speech":"No speech detected.","network":"⚠ Network error."}[ev.error];if(msg)aiAddMessage("bot",msg);};
  aiRecognition.start();
}
function openAISettings(){
  var cur=window.BUSYBEE_GEMINI_KEY||localStorage.getItem("bb_gemini_key")||"";
  var models=["gemini-2.5-flash-preview-04-17","gemini-2.5-flash-lite-preview-06-17","gemini-2.5-pro-preview-03-25","gemini-1.5-flash"];
  var mOpts=models.map(function(m){return '<option value="'+m+'"'+(m===(window.BUSYBEE_GEMINI_MODEL||models[0])?" selected":"")+'>'+m+'</option>';}).join("");
  document.getElementById("modal-root").innerHTML=
    '<div class="moverlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="msheet" style="max-width:460px"><div class="mhandle"></div>'
    +'<h3 style="margin:0 0 6px">🤖 AI Settings</h3>'
    +'<p style="font-size:12px;color:var(--txt3);margin:0 0 14px">Free key from <strong>aistudio.google.com</strong> → Get API Key</p>'
    +'<label style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px">API Key</label>'
    +'<input id="gemini-key-inp" type="password" style="width:100%;padding:9px 12px;border:1px solid var(--bdr2);border-radius:8px;font-family:var(--font);font-size:13px;background:var(--sur);color:var(--txt);outline:none;margin-bottom:12px" placeholder="AIzaSy..." value="'+(cur?"●".repeat(Math.min(cur.length,20)):"").replace(/"/g,"&quot;")+'" onfocus="if(this.value.includes(\'●\'))this.value=\'\'">'
    +'<label style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px">Model</label>'
    +'<select id="gemini-model-sel" style="width:100%;padding:9px 12px;border:1px solid var(--bdr2);border-radius:8px;font-family:var(--font);font-size:13px;background:var(--sur);color:var(--txt);outline:none;margin-bottom:16px">'+mOpts+'</select>'
    +'<div class="mbtns"><button onclick="closeModal()">Cancel</button>'
    +'<button onclick="window.BUSYBEE_GEMINI_KEY=\'\';localStorage.removeItem(\'bb_gemini_key\');closeModal();showToast(\'Key cleared\')" style="background:#fed7d7;color:#742a2a;border:none;padding:8px 14px;border-radius:8px;font-family:var(--font);font-size:13px;cursor:pointer">Clear</button>'
    +'<button class="primary" onclick="saveAIKey()">Save</button></div>'
    +'</div></div>';
}
function saveAIKey(){
  var inp=document.getElementById("gemini-key-inp"),key=(inp?inp.value:"").trim();
  if(!key||key.includes("●")){closeModal();return;}
  if(!key.startsWith("AIza")){if(inp)inp.style.borderColor="#e53e3e";alert("Key should start with AIza...");return;}
  window.BUSYBEE_GEMINI_KEY=key;localStorage.setItem("bb_gemini_key",key);
  var ms=document.getElementById("gemini-model-sel");
  if(ms){window.BUSYBEE_GEMINI_MODEL=ms.value;localStorage.setItem("bb_gemini_model",ms.value);}
  closeModal();showToast("✓ AI key saved!");
}
(function(){var k=localStorage.getItem("bb_gemini_key");if(k)window.BUSYBEE_GEMINI_KEY=k;var m=localStorage.getItem("bb_gemini_model");if(m)window.BUSYBEE_GEMINI_MODEL=m;})();
</script>
